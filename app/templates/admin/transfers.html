{% extends "base.html" %}
{% block title %}송금 내역{% endblock %}
{% block content %}
<h1>송금 내역</h1>
<table class="table">
  <thead><tr><th>ID</th><th>보낸 사람</th><th>받은 사람</th><th>금액</th><th>일시</th></tr></thead>
  <tbody>
  {% for t in transfers %}
    <tr>
      <td>{{ t['id'] }}</td>
      <td>{{ t['sender'] }}</td>
      <td>{{ t['receiver'] }}</td>
      <td>{{ "{:,}".format(t['amount']) }}원</td>
      <td>{{ t['created_at'] }}</td>
    </tr>
  {% else %}
    <tr><td colspan="5" class="muted">송금 내역이 없습니다.</td></tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
