{% extends "base.html" %}
{% block title %}마이페이지{% endblock %}
{% block content %}
<h1>마이페이지</h1>
<div class="card">
  <p>아이디: {{ g.user['username'] }} · 가입일: {{ g.user['created_at'] }} · 잔액: {{ "{:,}".format(g.user['balance']) }}원</p>
</div>

<h2>소개글 수정</h2>
<form method="post" class="card form">
  <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
  <input type="hidden" name="action" value="bio">
  <label>소개글 (200자 이내)
    <textarea name="bio" maxlength="200" rows="3">{{ g.user['bio'] }}</textarea>
  </label>
  <button type="submit" class="btn">저장</button>
</form>

<h2>비밀번호 변경</h2>
<form method="post" class="card form">
  <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
  <input type="hidden" name="action" value="password">
  <label>현재 비밀번호
    <input type="password" name="current_password" required>
  </label>
  <label>새 비밀번호 (8자 이상)
    <input type="password" name="new_password" required minlength="8">
  </label>
  <button type="submit" class="btn">변경</button>
</form>
{% endblock %}
